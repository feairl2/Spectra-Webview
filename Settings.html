<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: rgb(16, 16, 16);
            font-family: "Segoe UI", "PingFang TC", sans-serif;
            user-select: none;
            overflow: hidden;
        }

        .nav-panel {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 12px;
            gap: 4px;
            background-color: rgb(19,19,19);
            border-right: 1px solid rgb(50,50,50);
        }

        .nav-btn {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            background: transparent;
            border: none;
            color: #909090;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            border-radius: 6px;
            width: 100%;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #ffffff;
        }

        .nav-btn.active {
            background-color: rgba(255, 255, 255, 0.07);
            color: #ffffff;
        }

        .nav-btn.active::before {
            content: "";
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 3px;
            background-color: #ffffff;
            border-radius: 0 4px 4px 0;
        }

        .material-icons {
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="nav-panel">
        <button id="btn1" class="nav-btn active" onclick="switchTab(this, 1)">
            <span class="material-icons">settings</span>
            System
        </button>
        <button id="btn2" class="nav-btn" onclick="switchTab(this, 2)">
            <span class="material-icons">grid_view</span>
            Windows
        </button>
        <button id="btn3" class="nav-btn" onclick="switchTab(this, 3)">
            <span class="material-icons">edit</span>
            Editor
        </button>
    </div>

    <script>
        function switchTab(btn, index) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(index.toString());
            }
        }
    </script>
</body>
</html>
