<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#080808;
    --card:#151515;
    --border:#2a2a2a;
    --text:#ffffff;
    --sub:#9aa0a6;
    --green:#1f9d5a;
}

body{
    margin:0;
    padding:24px;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--text);
    opacity:0;
    transform:translateY(-40px) scale(0.96);
}

body.enter{
    opacity:1;
    transform:translateY(0) scale(1);
    transition:
        transform 0.8s cubic-bezier(0.08,0.9,0.2,1),
        opacity 0.4s ease;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    border:1px solid #323232;
    border-radius:8px;
    background:#181818;
    margin-bottom:20px;
    opacity:0;
    transform:translateY(-10px);
}

.top.show{
    opacity:1;
    transform:translateY(0);
    transition:all 0.5s ease;
}

.actions{ display:flex; gap:10px; }

.btn{
    background: #080808;
    border:1px solid var(--border);
    padding:8px 14px;
    border-radius:4px;
    font-size:13px;
    cursor:pointer;
    transition: all 0.2s ease;
}

.btn:hover{
background: #121212;
border-color: #303030;
}

.count{ font-size:13px; color:#aaa; }

.card{
    border:1px solid var(--border);
    border-radius:8px;
    padding:6px;
    margin-bottom:14px;
    background:var(--card);
    transition:border-color 0.2s ease, opacity 0.5s ease, transform 0.5s ease;
    opacity:0;
    transform:translateY(15px) scale(0.95);
    cursor: pointer;
}

.card.show{
    opacity:1;
    transform:translateY(0) scale(1);
}

.card:hover{ 
border-color:#404040; 
}

.card.selected{ border-color:#fff; }

.inner{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:transparent;
    border-radius:6px;
    padding:11px 16px; 
}

.left{
    display:flex;
    align-items:center;
    gap:14px;
}

.info{
    display:flex;
    align-items:center;
    gap:10px;
}

.user-label{
    color:rgb(150,150,150);
    font-size:14px;
}

.username{
    font-weight:600;
    font-size:14px;
}

.badge{
    font-size:11px;
    padding:2px 6px;
    border-radius:5px;
    border:1px solid #333;
    color:#aaa;
}

.game{
    color:#9aa0a6;
    font-size:13px;
}

.pid{
    font-size:14px;
    font-weight:600;
    letter-spacing:1px;
margin-left:auto;
padding-right: 14px;
}

.pid-label{
    color:rgb(150,150,150);
}

.status{
    padding:6px 12px;
    border-radius:6px;
    font-size:12px;
    font-weight:600;
}
</style>
</head>

<body>

<div class="top">
    <div class="actions">
        <div class="btn" onclick="selectAll()" data-i18n="select_all"></div>
        <div class="btn" onclick="deselectAll()" data-i18n="deselect_all"></div>
    </div>
    <div class="count" id="count"></div>
</div>

<div id="list"></div>

<script>
let clients = [];
let selected = new Set();
let firstRender = true;

let lastListLength = 0;

function render(list, preSelected) {

    list.sort((a,b)=>a.pid-b.pid);

    clients = list;

if (firstRender && preSelected && preSelected.length > 0) {
    selected = new Set(preSelected);
}

selected = new Set(
    Array.from(selected).filter(pid =>
        list.some(c => c.pid === pid)
    )
);

if (lastListLength === 0 && list.length > 0) {
    selected.clear();
    selected.add(list[0].pid);
    setTimeout(send, 0);
}

firstRender = false;

    const container = document.getElementById("list");
    container.innerHTML = "";

    list.forEach((c,i)=>{

    const el = document.createElement("div");
    el.className = "card";
    el.setAttribute("data-pid", c.pid);

    const lang = LanguageAPI.get();
    const t = translations[lang];

    el.innerHTML = `
        <div class="inner">
            <div class="left">
    <div class="info">
        <span class="user-label">Username：</span>
        <div class="username">Client ${i+1}</div>
    </div>
</div>

            <div class="pid">
                <span class="pid-label">${t.pid}</span># ${c.pid}
            </div>

            <div class="status">
                ${c.attached ? t.attached : t.not_attached}
            </div>
        </div>
    `;

    container.appendChild(el);
    updateCard(el, c, selected.has(c.pid));
    bindEvents(el, c.pid);
});

    updateCount();

if(!window._played){
    playCardIntro();
    window._played=true;
}

lastListLength = list.length;
}

function updateCard(el, c, isSelected) {
    el.classList.toggle("selected", isSelected);

const lang = LanguageAPI.get();
const t = translations[lang];

el.querySelector(".pid").innerHTML =
    `<span class="pid-label">${t.pid}</span># ${c.pid}`;
    el.querySelector(".username").innerText = c.username || ("Client " + c.index);

    const status = el.querySelector(".status");

status.innerText = c.attached ? t.attached : t.not_attached;

if (c.attached) {
    status.style.background = "#1f9d5a";
} else {
    status.style.background = "#444";
}
}

function bindEvents(el, pid) {
    el.addEventListener("click", () => toggle(pid));
}

function toggle(pid) {
    if (selected.has(pid)) selected.delete(pid);
    else selected.add(pid);

    updateAll();
    send();
}

function updateAll() {
    clients.forEach(c => {
        const el = document.querySelector(`[data-pid="${c.pid}"]`);
        if (el) updateCard(el, c, selected.has(c.pid));
    });

    updateCount();
}

function selectAll() {
    clients.forEach(c => selected.add(c.pid));
    updateAll();
    send();
}

function deselectAll() {
    selected.clear();
    updateAll();
    send();
}

function updateCount() {
    const lang = LanguageAPI.get();
    const text = translations[lang];

    document.getElementById("count").innerText =
        `${selected.size} / ${clients.length} ${text.selected}`;
}

function updateStatus(list){
    const lang = LanguageAPI.get();
    const t = translations[lang];

    list.forEach(c=>{
        const card=document.querySelector(`[data-pid="${c.pid}"]`);
        if(!card) return;

        const status=card.querySelector(".status");

        status.innerText = c.attached ? t.attached : t.not_attached;

        if(c.attached){
            status.style.background="#1f9d5a";
        }else{
            status.style.background="#444";
        }
    });
}

function send() {
    if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(JSON.stringify({
            type:"selection",
            pids:Array.from(selected)
        }));
    }
}

function playCardIntro() {
    const cards = document.querySelectorAll(".card");

    cards.forEach((card, i) => {
        card.classList.remove("show");
        void card.offsetWidth;

        setTimeout(() => {
            card.classList.add("show");
        }, i * 50);
    });
}

window.AnimationAPI = {
    playGlobalIntro() {
        const body = document.body;
        const top = document.querySelector(".top");

        body.classList.remove("enter");
        void body.offsetWidth;
        body.classList.add("enter");

        top.classList.remove("show");
        void top.offsetWidth;

        setTimeout(() => {
            top.classList.add("show");
        }, 100);

        setTimeout(() => {
            playCardIntro();
        }, 200);
    }
};

window.ClientAPI={
    setClients:function(list,selectedList){
        render(list,selectedList||[]);
    },

    updateStatus:function(list){
        updateStatus(list);
    }
};

window.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
        if (!document.body.classList.contains("enter")) {
            AnimationAPI.playGlobalIntro();
        }
    }, 50);
});

const translations = {
    en: {
        select_all: "Select All",
        deselect_all: "Deselect All",
        selected: "selected",
        attached: "ATTACHED",
        not_attached: "NOT ATTACHED",
        pid: "PID："
    },
    zh: {
        select_all: "全選",
        deselect_all: "取消全選",
        selected: "已選取",
        attached: "已附加",
        not_attached: "未附加",
        pid: "PID："
    }
};

function applyTranslation(lang) {
    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (translations[lang] && translations[lang][key]) {
            el.textContent = translations[lang][key];
        }
    });
}

window.LanguageAPI = {
    set: function (lang) {
        localStorage.setItem("lang", lang);
        applyTranslation(lang);
    },
    get: function () {
        return localStorage.getItem("lang") || "en";
    }
};

applyTranslation(LanguageAPI.get());

if (window.chrome && window.chrome.webview) {
    window.chrome.webview.addEventListener("message", event => {
        const msg = event.data;
        if (msg.startsWith("lang:")) {
            const lang = msg.split(":")[1];
            LanguageAPI.set(lang);
        }
    });
}
</script>

</body>
</html>
