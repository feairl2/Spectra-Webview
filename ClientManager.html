<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#090909;
    --card:#151515;
    --border:#2a2a2a;
    --text:#ffffff;
    --sub:#9aa0a6;
    --green:#1f9d5a;
}

body{
    margin:0;
    padding:24px;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--text);

    opacity:0;
    transform:translateY(-40px) scale(0.96);
}

body.enter{
    opacity:1;
    transform:translateY(0) scale(1);
    transition:
        transform 0.8s cubic-bezier(0.08,0.9,0.2,1),
        opacity 0.4s ease;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:21px;
    border:1px solid var(--border);
    border-radius:10px;
    background:linear-gradient(180deg,#1a1a1a,#131313);
    margin-bottom:20px;

    opacity:0;
    transform:translateY(-10px);
}

.top.show{
    opacity:1;
    transform:translateY(0);
    transition:all 0.5s ease;
}

.actions{ display:flex; gap:10px; }

.btn{
    background: #090909;
    border:1px solid var(--border);
    padding:8px 14px;
    border-radius:6px;
    font-size:13px;
    cursor:pointer;
    transition: all 0.2s ease;
}

.btn:hover{
background: #131313;
border-color: #292929;
}

.count{ font-size:13px; color:#aaa; }

.card{
    border:1px solid var(--border);
    border-radius:8px;
    padding:5px;
    margin-bottom:14px;
    background:var(--card);
    transition:border-color 0.2s ease, opacity 0.5s ease, transform 0.5s ease;
    opacity:0;
    transform:translateY(15px) scale(0.95);
    cursor: pointer;
}

.card.show{
    opacity:1;
    transform:translateY(0) scale(1);
}

.card:hover{ border-color:#fff; }
.card.selected{ border-color:#fff; }

.inner{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#171717;
    border-radius:6px;
    padding:11px 16px; 
}

.left{
    display:flex;
    align-items:center;
    gap:14px;
}

.info{
    display:flex;
    align-items:center;
    gap:10px;
}

.user-label{
    color:#9aa0a6;
    font-size:13px;
}

.username{
    font-weight:600;
    font-size:14px;
}

.badge{
    font-size:11px;
    padding:2px 6px;
    border-radius:5px;
    border:1px solid #333;
    color:#aaa;
}

.game{
    color:#9aa0a6;
    font-size:13px;
}

.pid{
    font-size:14px;
    font-weight:600;
    letter-spacing:1px;
}

.status{
    padding:6px 12px;
    border-radius:6px;
    font-size:12px;
    font-weight:600;
}
</style>
</head>

<body>

<div class="top">
    <div class="actions">
        <div class="btn" onclick="selectAll()">Select All</div>
        <div class="btn" onclick="deselectAll()">Deselect All</div>
    </div>
    <div class="count" id="count">0 selected</div>
</div>

<div id="list"></div>

<script>
let clients = [];
let selected = new Set();

function render(list, preSelected) {

    // 排序
    list.sort((a,b)=>a.pid-b.pid);

    // 更新 clients
    clients = list;

    // 只在有傳才覆蓋
    if (preSelected && preSelected.length > 0) {
        selected = new Set(preSelected);
    }

    // 清掉不存在的
    selected = new Set(
        Array.from(selected).filter(pid =>
            list.some(c => c.pid === pid)
        )
    );

    const container = document.getElementById("list");
    container.innerHTML = "";

    list.forEach((c,i)=>{
        c.index = i+1;

        const el = document.createElement("div");
        el.className = "card";
        el.id = "client-"+c.pid;

        el.innerHTML = `
    <div class="inner">
        <div class="left">
            <div class="info">
                <span class="user-label">Username:</span>
                <span class="username"></span>
                <span class="badge">N/A</span>
                <span class="game"></span>
            </div>
        </div>

        <div class="pid"></div>
        <div class="status"></div>
    </div>
`;

        container.appendChild(el);

        bindEvents(el,c.pid);
        updateCard(el,c,selected.has(c.pid));
    });

    updateCount();
    playCardIntro();
}

function updateCard(el, c, isSelected) {
    el.classList.toggle("selected", isSelected);

    el.querySelector(".pid").innerText = "# PID: " + c.pid;

    el.querySelector(".username").innerText = c.username || ("Client " + c.index);
    el.querySelector(".game").innerText = c.game || "Unknown Game";

    const status = el.querySelector(".status");

    if (c.attached) {
        status.innerText = "ATTACHED";
        status.style.background = "#1f9d5a";
    } else {
        status.innerText = "NOT ATTACHED";
        status.style.background = "#444";
    }
}

function bindEvents(el, pid) {
    el.addEventListener("click", () => toggle(pid));
}

function toggle(pid) {
    if (selected.has(pid)) selected.delete(pid);
    else selected.add(pid);

    updateAll();
    send();
}

function updateAll() {
    clients.forEach(c => {
        const el = document.getElementById("client-" + c.pid);
        if (el) updateCard(el, c, selected.has(c.pid));
    });

    updateCount();
}

function selectAll() {
    clients.forEach(c => selected.add(c.pid));
    updateAll();
    send();
}

function deselectAll() {
    selected.clear();
    updateAll();
    send();
}

function updateCount() {
    document.getElementById("count").innerText =
        selected.size + " of " + clients.length + " selected";
}

function send() {
    if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(JSON.stringify({
            type:"selection",
            pids:Array.from(selected)
        }));
    }
}

function playCardIntro() {
    const cards = document.querySelectorAll(".card");

    cards.forEach((card, i) => {
        card.classList.remove("show");
        void card.offsetWidth;

        setTimeout(() => {
            card.classList.add("show");
        }, i * 50);
    });
}

window.AnimationAPI = {
    playGlobalIntro() {
        const body = document.body;
        const top = document.querySelector(".top");

        body.classList.remove("enter");
        void body.offsetWidth;
        body.classList.add("enter");

        top.classList.remove("show");
        void top.offsetWidth;

        setTimeout(() => {
            top.classList.add("show");
        }, 100);

        setTimeout(() => {
            playCardIntro();
        }, 200);
    }
};

window.ClientAPI = {
    setClients: function (list, selectedList) {
        render(list, selectedList || []);
    }
};

window.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
        if (!document.body.classList.contains("enter")) {
            AnimationAPI.playGlobalIntro();
        }
    }, 50);
});
</script>

</body>
</html>
