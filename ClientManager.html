<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#090909;
    --card:#151515;
    --inner: White;
    --border:#2a2a2a;
    --text:#ffffff;
    --sub:#9aa0a6;
    --green:#1f9d5a;
}

body{
    margin:0;
    padding:24px;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--text);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px;
    border:1px solid var(--border);
    border-radius:10px;
    background:linear-gradient(180deg,#141414,#101010);
    margin-bottom:20px;
}

.actions{ display:flex; gap:10px; }

.btn{
    background:#0f0f0f;
    border:1px solid var(--border);
    padding:8px 14px;
    border-radius:6px;
    font-size:13px;
    cursor:pointer;
}

.count{ font-size:13px; color:#aaa; }

.card{
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px;
    margin-bottom:14px;
    background:var(--card);
    transition:0.2s;
}

.card:hover{ border-color:#fff; }
.card.selected{ border-color:#fff; }

.inner{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--inner);
    border-radius:6px;
    padding:14px 16px;
}

.left{
    display:flex;
    align-items:center;
    gap:14px;
}

.avatar{
    width:32px;
    height:32px;
    border-radius:50%;
}

.info{
    display:flex;
    align-items:center;
    gap:10px;
}

.user-label{
    color:#9aa0a6;
    font-size:13px;
}

.username{
    font-weight:600;
    font-size:14px;
}

.badge{
    font-size:11px;
    padding:2px 6px;
    border-radius:5px;
    border:1px solid #333;
    color:#aaa;
}

.game{
    color:#9aa0a6;
    font-size:13px;
}

.pid{
    font-size:14px;
    font-weight:600;
    letter-spacing:1px;
}

.status{
    padding:6px 12px;
    border-radius:6px;
    font-size:12px;
    font-weight:600;
}

.check{
    transform:scale(1.2);
}

/* animation */
.fade-in{
    opacity:0;
    transform:translateY(10px);
    animation:fade 0.25s ease forwards;
}

@keyframes fade{
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="top">
    <div class="actions">
        <div class="btn" onclick="selectAll()">Select All</div>
        <div class="btn" onclick="deselectAll()">Deselect All</div>
    </div>
    <div class="count" id="count">0 selected</div>
</div>

<div id="list"></div>

<script>
let clients = [];
let selected = new Set();

function render(list, preSelected = []) {
    clients = list;
    selected = new Set(preSelected);

    const container = document.getElementById("list");

    list.forEach(c => {
        let el = document.getElementById("client-" + c.pid);
        const isSelected = selected.has(c.pid);

        if (!el) {
            el = document.createElement("div");
            el.id = "client-" + c.pid;
            el.className = "card fade-in";

            el.innerHTML = `
                <div class="inner">
                    <div class="left">
                        <input type="checkbox" class="check">
                        <img class="avatar">
                        <div class="info">
                            <span class="user-label">Username:</span>
                            <span class="username"></span>
                            <span class="badge">N/A</span>
                            <span class="game"></span>
                        </div>
                    </div>

                    <div class="pid"></div>
                    <div class="status"></div>
                </div>
            `;

            container.appendChild(el);
            bindEvents(el, c.pid);
        }

        updateCard(el, c, isSelected);
    });

    updateCount();
}

function updateCard(el, c, isSelected) {
    el.classList.toggle("selected", isSelected);

    el.querySelector(".check").checked = isSelected;
    el.querySelector(".pid").innerText = "# PID: " + c.pid;

    el.querySelector(".username").innerText = c.username || ("Client " + c.index);
    el.querySelector(".game").innerText = c.game || "Unknown Game";

    const status = el.querySelector(".status");

    if (c.attached) {
        status.innerText = "ATTACHED";
        status.style.background = "#1f9d5a";
    } else {
        status.innerText = "NOT ATTACHED";
        status.style.background = "#444";
    }

    el.querySelector(".avatar").src =
        c.avatar || "https://www.roblox.com/headshot-thumbnail/image?userId=1&width=150&height=150&format=png";
}

function bindEvents(el, pid) {
    const checkbox = el.querySelector(".check");

    checkbox.addEventListener("click", e => {
        e.stopPropagation();
        toggle(pid);
    });

    el.addEventListener("click", () => toggle(pid));
}

function toggle(pid) {
    if (selected.has(pid)) selected.delete(pid);
    else selected.add(pid);

    updateAll();
    send();
}

function updateAll() {
    clients.forEach(c => {
        const el = document.getElementById("client-" + c.pid);
        if (el) updateCard(el, c, selected.has(c.pid));
    });

    updateCount();
}

function selectAll() {
    clients.forEach(c => selected.add(c.pid));
    updateAll();
    send();
}

function deselectAll() {
    selected.clear();
    updateAll();
    send();
}

function updateCount() {
    document.getElementById("count").innerText =
        selected.size + " of " + clients.length + " selected";
}

function send() {
    if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(JSON.stringify({
            type:"selection",
            pids:Array.from(selected)
        }));
    }
}

window.ClientAPI = {
    setClients: function (list, selectedList) {
        render(list, selectedList || []);
    }
};
</script>

</body>
</html>
