<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0b0b0b;
    --card:#151515;
    --inner:#1b1b1b;
    --border:#2a2a2a;
    --text:#ffffff;
    --sub:#9aa0a6;
    --green:#1f9d5a;
}

body{
    margin:0;
    padding:24px;
    background:var(--bg);
    font-family:'Inter',sans-serif;
    color:var(--text);
}

/* 🔥 Top Bar */
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px;
    border:1px solid var(--border);
    border-radius:10px;
    background:linear-gradient(180deg,#141414,#101010);
    margin-bottom:20px;
}

.actions{
    display:flex;
    gap:10px;
}

.btn{
    background:#0f0f0f;
    border:1px solid var(--border);
    padding:8px 14px;
    border-radius:6px;
    font-size:13px;
    cursor:pointer;
    color:white;
}

.btn:hover{
    border-color:#444;
}

/* count */
.count{
    color:#aaa;
    font-size:13px;
}

/* 🔥 Client Card */
.card{
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px;
    margin-bottom:14px;
    background:var(--card);
    transition:0.2s;
}

.card.selected{
    border-color:#fff;
}

.inner{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--inner);
    border-radius:6px;
    padding:12px;
}

/* left */
.left{
    display:flex;
    align-items:center;
    gap:14px;
}

.avatar{
    width:32px;
    height:32px;
    border-radius:50%;
}

/* text */
.username{
    font-weight:600;
    font-size:14px;
}

.label{
    font-size:13px;
    color:var(--sub);
}

.pid{
    font-size:14px;
    font-weight:600;
}

/* attached */
.status{
    background:var(--green);
    padding:6px 12px;
    border-radius:6px;
    font-size:12px;
    font-weight:600;
}

/* checkbox */
.check{
    margin-right:10px;
    transform:scale(1.2);
}
</style>
</head>

<body>

<div class="top">
    <div class="actions">
        <div class="btn" onclick="selectAll()">Select All</div>
        <div class="btn" onclick="deselectAll()">Deselect All</div>
    </div>

    <div class="count" id="count">0 selected</div>
</div>

<div id="list"></div>

<script>
let clients=[];
let selected=new Set();

/* 🔥 render */
function render(list, preSelected=[]){
    clients=list;
    selected=new Set(preSelected);

    const container=document.getElementById("list");
    container.innerHTML="";

    list.forEach(c=>{
        const isSelected=selected.has(c.pid);

        const el=document.createElement("div");
        el.className="card "+(isSelected?"selected":"");

        el.innerHTML=`
            <div class="inner">

                <div class="left">
                    <input type="checkbox" class="check" ${isSelected?"checked":""} onclick="event.stopPropagation();toggle(${c.pid},this)">

                    <img class="avatar" src="https://www.roblox.com/headshot-thumbnail/image?userId=1&width=150&height=150&format=png">

                    <div>
                        <div class="username">feairl123</div>
                        <div class="label">Unknown Game</div>
                    </div>
                </div>

                <div class="pid"># PID: ${c.pid}</div>

                <div class="status">ATTACHED</div>

            </div>
        `;

        el.onclick=()=>toggle(c.pid,el);

        container.appendChild(el);
    });

    updateCount();
}

/* toggle */
function toggle(pid,el){
    if(selected.has(pid)){
        selected.delete(pid);
    }else{
        selected.add(pid);
    }

    render(clients,Array.from(selected));
    send();
}

/* select all */
function selectAll(){
    clients.forEach(c=>selected.add(c.pid));
    render(clients,Array.from(selected));
    send();
}

function deselectAll(){
    selected.clear();
    render(clients,[]);
    send();
}

/* count */
function updateCount(){
    document.getElementById("count").innerText=
        selected.size+" of "+clients.length+" selected";
}

/* send to winform */
function send(){
    if(window.chrome && window.chrome.webview){
        window.chrome.webview.postMessage(JSON.stringify({
            type:"selection",
            pids:Array.from(selected)
        }));
    }
}

/* API */
window.ClientAPI={
    setClients:function(list,selectedList){
        render(list,selectedList||[]);
    }
};
</script>

</body>
</html>
