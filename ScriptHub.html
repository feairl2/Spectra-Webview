ࢷ࡜࣍ࢍ࣫࡜ࢺࡠࡠࣈࣁ࣑ࡹࠃࠆ࡫ࣱࠜࠅࢩ࠺ࡲࡴ࣏࣌ࡏࣹ࣋࣋࠱ࡿࡑࣤ࣠ࢹࡗ࠯ࠈࠂࠑࢂࡥ࣭ࢭࢢࡨ࠻࠰ࣴࡰࠦ࠮࢔࠼࡚ࠣࢺࢂࠀࠤࡱࢣࡔࠗࢉࡊ࢖ࢦ࣐࠾࢛ࠋࠂ࢕ࢎ࠴ࣆࣦ࠻࠾࠯ࢧ࠹ࢂࡺࡰ࣮ࡊࡧࢠ࣐ࣉࣁࠇࢆࠌࣆࣖࢹࡰࡕ࠭ࣜࣇࠒࢫࡋ࢑ࣉࣉࣩࠡࡲ࣎ࠆࢗࢀࠀࢫࠩࠃࢤࢦࡕࣱ࣯ࣺ࣯ࠡࠊࣄ࢞࠶ࢊ࠽ࡏࡻ࣒ࡾࠔ࣐࡮ࡽ࣏࣠ࡱࣈࠛ࣬ࢧࢊࣝ࡟࣐࣎ࡗࢀ࠵ࣝࢄࡗࢪࠢࠏࡊ࠺࠳࡚ࠥࢄࢅࡺࢦࠑࡁࣩࣣࠑࠊࢦࡸࡖࣟ࣊࠷ࡖࣺࣄࢴࣷ࠹ࢡࢩ࢘ࠌࢭࣾࣿ࢟࢜࡬࢙࢕ࡪ࠙ࣈࣺࢣࡊ࠲ࡾࠏ࣋࣡࢜ࠂࣷ࠰ࢍ࢏ࣅࡰࣟࡴ࣠ࡉࢴ࢛ࢳࣱ࣐ࢳࠞࠏࢊࣻࢃࡿࠬࢻ࠼࠻࠽ࢩࣜࡣࠗࠝࠛࢶࣈ࢙࠱࣋ࡼࣤ࠳ࣾࡑ࣍ࢊࠤ࠯ࠛࡤࡷࢆࣄ࢏࢒࡭࠰ࡰࢻࣽ࠘ࠓࡢࢦࣚࣀࢥࢊ࠼ࡈࢃ࣏ࠥࡎ࣒ࣶ࢒ࡈࠃ࠽ࣉࣙࢢ࡫࡜ࣔࠖࡦࣴ࢑࠘ࢤࢡࢯࢱࠋࣕࠇࢮ࡜࣭ࣴࣤࢃࢽࡁࡪࡑ࣭ࣞࡧ࡙ࡢ࣮ࣩ࢔ࣤ࠻࠿ࠎࡨࡘࢠࣄࢇࢱ࢝࣪ࠬࠃࣃࡢࣩ࣏ࡎࡒࠏ࣡ࡻ࣐ࢲࡼࢡࠍࢠࣺࡿ࢛࢜ࠤ࡛࠽ࠐ࢘ࡰࠀ࢔ࠆࠣࠈࢪࠒࡆࢴࡢࢗࠦ࠲ࢋ࣓ࡈ࣋ࣕࠀ࣢ࣃࠉ࣌ࡦࡊࠑ࢐ࣟ࢏࣏࢈ࢻࡢࡓࡿࡽࠉ࣭ࠪࢬ࢒࣊࠱ࣹࡋࣾ࢕ࣜࢧࢪࡅࣺ࢞ࡔࡴࡄࢍࣲࣉࢴࢨ࠿ࠁࢋࡠࡀࢃࠏࢩࣤࡦࢍࡺࠣࡁ࢔࣯ࣤࠉࡣࡅࢿ࠮࠶ࢇࣨ࢕࠷ࠉࢋࠔࠦࢆࡤࣲ࣌ࢎࣜࢧࠚࠎ࣐࢛ࢠࣺࠍࡨࣸ࡫ࡹࡐ࠾ࣽࠞ࠾ࡖ࠽ࡦ࡜࡬࣭ࣃࣆ࠵࣭࢜࣫ࣈࡻࣚࠞ࢝࠰ࣩࠤࡖ࣢ࠃࢧ࢔ࣅ࡚ࢦࢮࢴࠥࡤࣣࣿࣝࢊࠩ࡬࠸࢜ࡑࢠࡾࣶࡠࡤ࢕ࢊࢆࣲࢷ࣠ࣈ࠳ࣾࠔ࣯ࡷࢋ࣪ࡀ࡛ࡌ࢏ࠐ࠵ࣁࣜࠚࢦࣦࡱࢂࠁࡀ࢔ࡴࡧࠏࢮࡱࠪ࡫ࡊ࢐ࠀ࠽ࣕ࠾࣭࡬ࢴࠉࢹࢳࢎࡶ࠳ࣲࠩࠫࢀࡢ࠴ࢎ࡛ࠥࣼ࢈ࢼࢬࠩࠧࣗ࠴ࡤࣆ࣓ࣄࢵ࣏ࢵࡴࣚࠂ࢟ࡪ࡙࠘ࣖ࣠࢞ࣈࢫࡶࢄࠨ࢏ࡔࡹࡈࡠࠪ࠘ࡕࠆ࠰ࡵࣙ࡫࣐ࣆ࡮ࢁ࢝ࡪ࢜࢓ࣿࢨࣺ࣡ࠥࠒࣣࣳࠨࡰࣻࣼ࠲ࠢࢸ࢕ࠅࡔࢠ࠱ࢆ࠹࢕࢞ࢋ࠸࢚࠿ࢎࢨ࣓ࠐ࣏ࠟࢯࣇ࢖ࡵࢶࣤࣟࣃࡼࠥࣻࢸ࠙࠴࣮ࠫࣽ࣍࣪࣠࠽ࠚ࡟ࣚࢆࡪࢄ࢏ࣦ࢛ࠜ࠮ࡵࠁࡄ࡯ࠞࡥࠄࣂࠌࢗ࠙ࠥࢪࣝ࡭࢝ࢢࢂ࢈ࠋࢤ࣍ࢯࢦࠝ࢑࣫࠼࣒ࢀ࡛࢓ࡐ࣓ࡊࠈ࣌࢔ࠣࠄࡧࡷࠕ࢜ࠗࢀ࢓ࢬࢗࠊࡰ࢟ࠓࢬࢂࡰࣆࡳࣺ࠽ࣰ࣑ࣟࡸࡁ࠶ࡺ࣬ࢦࡖ࠲ࠄࡊࡂࠔ࠳ࢤ࢐ࢌࡽࢸࣹࢣ࠰࡯࣭࡯ࣕࣳࡊ࠻࡚ࠫ࣠ࢀࡰ࣠ࡸࠤࢬࣻ࢒ࣕ࣠࠼ࠐ࠙ࣔࢆࢣ࡫ࡊࢃࠥ࠹࡚ࠠࡈ࢐࢙ࠤࢉ࣯࢔࠴࠵ࡱ࣊ࢹ࢙ࠛࠢࠋࡀࣟࠊࡄࣦࣨࠔ࡜ࢣࣱ࡙࣋ࡆࢃࣝࢬࢎ࠵ࣚࠩࣄ࠹ࠊࡴࡱࡥࠜࡂࣶࠗࡡ࡝ࡐࢆࠂࡧ࢈ࡋ࢛࠺ࠄࢠࣜࣄࡤࡌ࢐ࣄ࣭ࣅࣈࢴ࢚ࣳࠇࡐࡓࡈ࢖ࣛࣗࡇࣦࢗࡊࢋࠩࣈ࣍ࡸࡹࠇࣧࢴࡐ࣠ࢥࢮࠗࡓࠏ࢚࣑࡙ࠗࡼࡢࢀࠞ࢓ࡻࣵࢪࣧࠔࣙࣈ࠰ࡾࢾࣟࣳࣻ࠺ࢯࡴ࡬ࠔ࠼ࣽ࠯ࣅ࢚ࠄࡖࠜࢌࡠࠅࡦࢼࡑ࣓ࠣࡪࣱ࡟࣪ࣁ࣑ࣹ࣮ࠬࠫ࡯ࢆࠒࠆ࠱ࢀࣦ࣏ࣖ࠳ࡻࡘ࢚ࡇࠉࡅ࢛ࡒࠏࠁࢼࢤࠝࢲ࠷ࡾࣆࡃ࢕࣠࡝ࢱࣙࣸࡴࠥ࣪ࠞࠎࢗ࠴ࡒࡲ࠙ࣀ࣭ࠜࣴࢰࢍࣦࢱ࡙࣯ࣘࣔࣽࠠ࠲࠻࣒ࢩࠧࢾࠧ࢒ࠉࡳ࠱ࣳࡰࢎࢸ࡚ࠛ࢑ࡳ࢒ࡀࡓࡽ࣬ࡹࢗࠓࡴࣽ࠳ࢹ࢓ࡕ࢖ࠒ࣒࠵࣯࣊ࢋࠇࠫࢉࡓ࣬ࣷࡥࠤ࣓ࣶࣚ࠼࣋࠘ࠗࣖࠛ࠿ࡣࣾࢎࠕࠜࣙࢀࢷࠪࠗ࢈ࡵࢬࠠࠚࠢࡱࣛ࣎ࡈࣅࢅࢩࡄ࢏ࢥࡰ࣊࡫ࠂࣤ࢘ࢫࠀࣻࣁࣽࣵࡏ࣒ࢋࠛࡷࠄ࣪ࣕࠕࠗࣘࡻࢾࢍࡕࡹࠨ࠺ࡦࢩࢗࠑࣱࢇࡥࠏ࢖࢐࠘ࠌࢲࡡࠆࢹࠟࡲ࠷ࢭࡓࣩࠩࢅࢡ࢒࣮ࣕࢰࠔ࣬ࢉࠞ࢐ࢍࣁࡹ࠸ࢸ࠲ࢵࢻࡵࢺࢭࡆࢽࡒࠀࠔࣸࢌࣧࡱ࣡ࠉࡁࢨࣙࢻࡤࣺࠈࡱࣁ࣒ࡄࠑ࢚࡛ࢩࡴࠈࢠࢆࡡࡗࢭࡌ࢛ࢽ࣒ࠦࢹࡒ࠶ࢻࠅ࢓ࠝࣃࡡ࢔ࢆࣸ࡝࣊ࡦࣀࢦࡇࢳࣴ࣢ࣉࢰࡹࡩࡦࡸ࣊ࢧࡉࠫࠜࢽࡦࣗ࠸ࢱࣇࢿࠀࡘࠤࣤࡡ࣍ࣅࢎࡢࣝࢮࣶࢬࠅࡎࡤࣚ࢈ࣣ࠘ࠀࢽࡍࡱࠁࠐࠝ࣋ࣴࡩࣼࠕࡼࠏࡀ࢙ࢽࣙࠐ࢙ࢰࣣࣵࣉ࡟ࢂࣤ࡯ࡥ࡜ࢯࣅࢾ࣒ࣼࣷࢎࠃ࢘ࠅࡳࢄࡀࣣࣼࡇࡷࢹࣩࡤࠬࠚ࢟ࢆ࣎ࣜࠄࢣ࢘ࢾ࠽࡯ࢬࠜࠑ࣭ࡵࣲࣃࣽࡱࠣࢺࡶࢩࠨࣱ࡭ࣩࠬࢭࢵ࠭ࠂ࡭࢛ࡨࢬࢄࡧࣦࣄࡅ࡭ࣅࡀࢤࢴࠝࡴࡡ࣍ࠇࣶࣘ࠸ࢗࡈ࠭࣎࠽ࣄࢵࢲ࠾ࡠ࣌ࣙࠊ࣫ࢊࣈࣣࢼࠥࡉ࢕࣢ࠃ࢓ࢾࢭࡃࡼࢌࡅ࡮ࢋࡏࣩ࠘ࡪ࢒࢙ࠣࡐࡒࡱ࡞ࡔࠧࡉࣱࣾࡢࡺࢩࠌ࢓࠴ࡄࢅ࠺ࡋࢃࠫࣈࣲ࡛ࡠࢵࠣࡂࢬࣺࡰࢡࡊࢋࠂࡍ࢑ࠔ࣯ࠑ࠮ࣺࣛࣧ࡫ࡁࡦࢬࣉ࡫࣬ࢴࡏࣱࡗࢩ࢐ࢮࣤࡘࠉࡊࠢࡺ࢑࢝ࢯ࣏ࢉࠚࢆࣰࣕࢄ࡚࡚ࠁ࢙࣍ࣥࡴࠌࣖࣇࠠࡄࠏࢾࠇࣳࣳࡐࡩࡃࢦࠔࣕࢶࢄࢧࡘࢨࠟࡃࠚࡑࠜࢫ࠽ࢣ࠽ࢤࡽࠤ࣐ࢪࢄ࣪ࡃ࣠ࢫ࣏࣬ࠁ࣊ࠪࢡ࡭ࡣࣴࢢࡴࢋࡑࠕࣦ࢞ࣴࢁࣦ࠲ࡐࢸࣱࡶ࠺ࡠࣁ࡛ࣜࢤࠩ࠭࢑ࡥ࡞ࡺ࢑ࣰࣱ࣎ࠝ࡞ࡍࣂࠑࡊࠋࢭࣿࠕ࡭ࣱࣶࢗࣨࠪࠧࣛࡅࣕࡑࣗࠄࡖࠓࡣࡨࣤ࢜ࡐࢃࢺࢾࢻࠓࠩ࣢࡬ࠞࢾࣤࣈࢼ࢜࠹ࣺ࠭ࣆࢻ࡮࢜࣍ࢢࣸ࠸ࣥࠫࡷࠝࠒࠥ࠿ࢥࣧࡼࠡࡅ࣐ࡈࡂࢬࣻ࡮ࠃࢌ࡛ࢴࣦ࢐ࢻࡽࡕ࢙ࢵ࡚ࠝ࣡ࣚࡎ࡟࠷ࡔࣞࡍࠐࢍࢅࣻࠪࠌ࣭ࣉ࡝࠲ࡕࢌ࣫ࠑ࢖ࡶࡻࠢࡡ࡜ࢿࣛࡷࢡࠠࢸ࣯ࠁࣙ࠘࡭ࢼࠏ࠴࠻࣪ࠁࠋࡗࢅࠐ࠴࠹࣑࡟࣯ࣉࣂࣵࢆࡨ࢞ࢧࡗࣧࡣࢄࢂࡘ࣎ࣿࡓࣽࢳࠂࠁࠗ࠴ࣟ࠸ࠤࢨ࠳ࡓ࣯ࣝࠥࡽࡳࣉࢬ࠵࣒ࣝ࢕࠳࠴࡮ࠀࢄ࠰࣏ࢲࡪࣷࡍࠐࡾࢬࠫ࡮ࡵࢴࠟࣄ࠯ࡩࡔࣕࣝࣾࢠࡹࢣࣺࡅࣁ࠯ࡀ࢛࡮࠲ࢷ࠴ࢤࠄࠒࣣ࣎ࠊ࢏ࠩࡸࢭࠧࣸࡂࢮࣜࡶࡄ࠲ࡕࡢࠕࣜࠖࠇࡍࠒࡊ࢔ࣻࡵࠏ࢔ࠨ࡫ࡧࢠࣣࢸ࠴ࡇ࣑࢝ࠛࠂࣕࠤ࠸ࠐࡺࣁ࠷ࡹࠞࣄ࠵ࣃ࢚࡯ࣦࣘࠞࠊ࠾࣋ࢄࡪࢦࢯࢡ࣒ࢃࢸࢋ࣭ࢉࡀ࢚࠾ࢰ࢘࢞ࡶࠀࡪࡴࣷ࡟ࠫࢉ࡮ࡊࡿࢋ࢖࡜ࢋࠑࢢࢽ࡝ࠓ࢈ࣺࠠ࡜ࢰ࢙ࣗ࢏ࣂ࡟ࢪࣤࡽࣷࡽࠃ࣮࡛࣍࠭࡝ࡋࠉࣤࣛࠤ࣒ࣿࢼࣲࢯࠠࢹࡧࠉࢂࢴࣱ࣫ࡸ࡭ࡲࢴ࡫ࣰ࢓ࢺࠡࡾࡹࡗࡽࡤ࢑࡫ࢢࢉࠠࠐࠏ࠽࣫ࡰ࢙ࣜࣆࣀࡉ࢜ࣷࡡࢃ࣊ࢦ࣋ࡎࠟࣤࠣ࢒ࠆࣦࣩࢬ࣒
