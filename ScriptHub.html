ࠖࡂࢭࢰࡼࣿࣻࢨࡺ࡟࠙ࠚࡁࡄࠨ࣑ࣸࣟࢧࢯࠗࡷࡌࠥ࢔ࢲࠏࣘࠥࠧ࣎ࠍ࠶ࢃࣦࠁࣻ࠰ࡱࣟࠜࠔࢅࣣࣺ࣒ࣾࠍࢧࢉ࢓ࣃ࢑ࠫࠀࠋ࣠ࣀࡍࡃ࢈ࢥࠂࢸ࢝࠯࣠ࡆࣇࣈࠌࣟࢄࢼ࡜ࡒࡲࣃࠁࢾࣲࡡࠠ࣌ࡶࠬࡿ࢒ࢭࣺ࣓࣢ࣴࣀࠖࠬࡈࡊࡁࠫ࠿࡚࢑ࣕࡵ࠵ࣀࡥࡄࣄ࠙ࣆ࠭ࢤࢹ࠹ࣄ࣡ࢫࣇ࢖࢔ࡳ࣑ࠪࠜ࢕ࠍ࣮ࣕࡂࡨ࡮ࡈࡨ࣪ࢍ࢈࣭ࢀ࢓ࣵࡄ࣒ࣟࠝࢊ࣠ࣷ࢔࠵ࠞࣄࡵࡌ࠾ࠣࠏࡴࡢࣂࠁࢗࢤࢣ࢑࡜ࡀࠁࣷࣥࢺࢥࡽ࢐࡜ࡍ࡟࢝ࡉࣝ࡬࣋ࡸࣰࡉࠢࣜ࢒࢓ࢾ࣒ࣳࢷ࠿ࡊࡍࣖࢇࡆࠓࠫࠫ࠴࣫ࡶࡱࢯࡂ࡮ࠄࣉࡻࡹࢠࢼ࣯ࡎࢥࣉ࠱ࡒ࣡࢟ࢋࣞࡆࢎࢨࣲࣤࠏࡷࠠࢇࠈࣙࡺࠂࡲࡕࣻࢶࣀࡱࢼࡪࢹ࣑࡛ࣉࠚࢗࣁ࣋ࡠࡕ࣐ࣅࡇࣼࡍ࣌ࡒࡳࢠࣟ࠽࢑ࡪࣉࠨࣩࡀࣘࡖࠞࣈࡶࠔࢣࠜࡋ࢞ࣼࡠࠥࡕ࠾ࡖࠈ࡜࠰ࠦࢹࠉࢭࣣ࣒࡭ࡨࢦࡒࡨ࣡࠺࢔ࡒࢷࠕࣧ࢟࢟࣬࢓ࡕࣩࠩࡰࢭࠉ࣫࠵࠻ࠚࠓࢮࡖࢩ࢏࢏ࢭ࣫ࠝ࠽ࣲࢗࣸࡼࡵࡎ࠻࣪࡫ࣆࠉ࣏࣌ࡿ࠱࣏ࢻࢎࠊࣸ࢓࢓ࠎࡘࢶࠃࡢࠂࣽࡸࢎࢄࡧࠀࡲࢗࢆ࡚ࢶࣁ࠰࠴ࣝ࠾ࠛࡌࠠࠀ࠻ࣩࠛ࣌ࠩ࡝ࣆࠁࡥࣜࣅ࡮ࣁࡌࣖࢣࢹ࣍ࡂ࡚࡬ࣨࢾ࠸ࣰࠈࢭࢁ࢙࣒࣎ࠌࡿࠡ࠲ࢮࠀࠪ࣋ࠬ࠽ࢬࡀࢨ࢚ࠢ࣎ࠍࡺࡗ࣢ࣕ࠙ࣔ࢘ࡴ࡮࢏ࣔࢸ࣐ࠝ࠴ࣆࡤࡼࠔࠚ࠴࠵࠱ࠀ࡝ࠖࡦ࢐ࡳ࡭࠵࣢࢒࠘࡞ࣹࠅࣾࠢࡖ࢚ࣗࢭࣿ࢝ࡶࡂࢾࣦࡨ࣮ࣗࠠࡓ࠱࢑࢘ࢼࠄࠑ࣢࢙ࠫࣿࣁࡻࢫࣦࠎࣸ࣍࢈ࡄ࢒ࡸࣽࡌ࠸ࢇࡻࢿࡩࢿࡾࠟ࠿ࣧ࠷࣌ࣙࣛࢽ࠴࠷ࣃࣟࢹ࠴ࡴ࣌ࡼࡑࡒ࠘࡞ࣙࠇࠏ࠱࣫ࣿ࢈ࡀࠒࡀࠟࠫ࣢ࡼࠏࣅࡑࠫ࣍࢈ࠆࠨࠓࣔ࠶࠮࢖ࣦࣷࡰࠕࣗࢦࡔࡪࠣࢣࠉ࠳࡬ࣜࠟ࡝ࡱࣺࢠࡨࡌࡵࡺ࠿࠮࢒ࢍࠩ࡮ࢱࡗ࡫࡙࢚࢛ࣻࢥࣛࢿࡊ࣑ࠢࠊࣷࢯࠢࢰࢮ࢕࠵ࣇࣅࢊ࢏ࡋ࠮ࡘࢶࣹࣴࠔࠎࢱ࠙࣍ࡷ࠯ࢪࠧࡶࢾࡰࣳࡒࣺࢂࢪࣩ࣭ࠬ࠽ࠓࢲࢼࠗ࣡ࡹ࢙ࠝࢧ࣯ࢇࣱ࡚ࣝࡇ࣠࣢ࢽ࡚ࢩࢆࡸࠤࣹࣀ࡭ࣴࠆࡤࡀࡪࢡࡲࣲࠊࡨ࢛࣌ࢅࡹ࡞ࠕࢢ࡞ࢮࠦ࠯ࡼ࣐ࣞࢆࢳࡓࠓࣧࣃࡃࣷࣨࡅࣂ࣏ࠎࠨ࠮ࡢࡿ࢘ࠎ࠺࠭࠰ࣝࡶࡐࠑࡶࡦࠉࡀࣘࡘ࠴ࠢ࡟࣊ࡲࡹࣰ࡚࣫ࡉࢻ࣬ࣉࣽ࢐ࡗࠬࠏࢴࣻ࣡ࡰࠉࣺࢦࣩ࡫ࡌࣵࣴ࡞ࢸ࠮ࠏࠀࡈࡋࢣ࣊ࡳࡈࣀࡤࠫࡇࠥࡢ࠶ࡊࣇࢦࢵࣘࡥࣂࡓࡻࣙࠀ࡬࡟ࡩࠑࢀࢬ࣓࣯࠮ࣺ࠽࡝ࠒࢆࠈ࢝ࡂࡧࠂࣀ࢚ࠗࡧࢎࡗࡌࡥࠢ࡯ࡿࠫࠗࠨࣈࠂ࣋ࢡࢊ࡙ࢿ࠲ࠋ࣏ࠔࡹࢄࢳࣀ࡮ࢩ࣎ࠊ࢛ࢻ࢖ࣲ࣪ࠚࠗࢵࡸࢁࢧࡱࢰࢅࣥࠊࢋࣟ࢑ࡺࣶࠐࡕࠫࢡࢿࢁࡪࣦࣙࡇ࣬ࣴࠪ࢑ࡱࡷࢄ࠻࠘࠮ࠕࠚࠤࠗࡏࠄࡷࡔ࠹ࠓࣉ࣪ࢸࣶࠎࡁࠩࣉࡰࢆࠉ࣯࠙ࣈࡸࡴࡖࡇࣗࢆࠍࠍࡴࣞࢯࡊࢅࢉࡡࠐࡏࣁ࡬࠘࡫ࡤࣶ࡫࣓࢛ࣕࡃࠄ࢙ࡗ࠻࢏ࠋࡸࣳࢧࠃࢫ࡯ࣉࠄࢉࡢࢹࢍࢁࡒࢭࡀ࣫࣌ࡄ࢞ࣛࣔࠃ࡝࣭࣡ࣄࣺࣣ࣐ࠫࣨࡅࢴࣆࡉ࡛ࣆࣄࠢࡅࠏࢠࢢࡇࡄࡪࡋ࠳ࣖࡥ࡟ࢹࠃ࢜࢑ࠏ࣮ࡶࢲࣜࢶࡂ࣎࢜ࢳ࣬ࠓࡌ࠾ࠩࡇࢦࠎ࢞ࢥࣥࢳࣶࡐࡩࣥࡻ࡛ࠦ࠿ࢎࡢ࢙࣬ࡣࢭࣨࡂࡩࡏࠈࡡࢣࠠ࣡ࡎࡪࢊࢷࡴࣩࡃࠡࢗࡕࠀࡋࣧࢢࢸࢧࡔ࣪ࠌ࠮࠼ࣰ࣑࣯ࣗࢬ࢛࠸ࢍࢇ࠹ࢮࣹ࠹࣏ࡂࠬ࢓ࡴࠎࠩࡍࢺࣉࣞࠏࣂࡹ࠸ࠌ࠻࡝ࣻࢩࠨࣰ࣐ࣘࣳࠊ࣐ࣳࣾࣃ࠷ࡣࢸ࡜ࠡࠄࢴࢦࢮࣶࡢࣲࡲࣨࡒࢷࢧࢆࠧࡳࢰࢎࣞࢼࡐࣉࣰࣱࣖ࠿ࢦࣹࠣࣕ࢖ࣹࣻ࠯ࣵࢬࠒ࢕࣫ࣅ࡟ࡥࡺ࠷ࡇࢆ࣪࠯࡜࠶ࣾࡆ࠯ࣱ࣐࢙࢞࣎ࠍࢪࣙ࡫࣌ࠏࡻࠠࣚࢠࢨࢍ࢜ࠎ࢐ࠍࠂࢃ࡛࡙ࢨࡴ࠲ࠃࡖࡄࡾ࣎ࢬࢧࡀࠁࣚࠅࢪࣗࡊࡣࢷ࢖ࣰ࢔ࢗࣃࡺ࠺࠺ࡽ࠙ࡇ࡝ࢬࡇࣙࠣࡓ࠹࠺ࡊ࡙࣮ࣵࡗࡹࡉ࣢ࢩࣈࡷࣹࡿࠜ࢖ࣱ࢞ࢩࠉࣛ࢑ࣁࡔࢅࡌࡖࢳ࢘ࢡ࠵ࡀࢁࣔࣁࡲࡥ࠘࢐࢐࢞ࣴࣟࠬࠓ࣓ࠟࡄ࢖ࢇࣁࠩࠚ࠳ࡃࢋࡊࡼࣈࣛ࠰ࣲࡓࡀࡴࡸࢽࢲࡳࠒ࠺ࡳࠡࡷ࢔ࠞ࠘ࢷ࠸ࣧࢥࡖࠃ࢞ࡥࢀࣰ࠘࢞࢜ࡃࠇ࢏࡯࠮ࡉࣅࠎࣾࢎࡒࠔ࢛ࢗ࠙ࣔࠇ࡙ࡻࠪ࡫ࣦ࢞ࢁ࠼ࣔࢃࣄ࢛ࣳࣾࠕ࠙ࢥ࢙ࡓ࢞ࢧࢢࠆ࣏ࢥࢱࡑࡉࢺࡄࢃ࣒ࠎ࢚ࡀ࡫࡟ࠂ࡜ࣁࠐࠤࣧࣀࠝࣻࣧࣳࢥࡹࢺࢄ࠾࣬࢜࠳ࡎࡉ࠭ࠍࠕࢽࠠ࣎ࣻࢯࣲ࢛࠺ࢃࡢࡗࠌ࢐ࡴࠅࢥࢀ࠸࣯ࠁࡂ࡙ࣙࠛࠬ࢔ࣩ࠰ࢇࠄࢻࡢࠥࢫࡢࠦࡨ࣮ࣝࢴࡲࢌࠄ࣑ࡽࠤࡡ࠰࢔ࠠࡽࣀࢠ࢕࡚ࣺࢭࢌ࠻ࡆࡀ࣓ࠝ࢔ࠁࡕ࣓ࠖࡔࠦ࢏࣎ࣷ࢒ࡇ࡛ࡩࢦࣚࣉ࠺࡯ࠕ࣬ࡪࢊ࣭࢝ࡁ࢛ࠁࡶࡖ࣬ࢮࣨࡡࠡࡢࢂࡈࣃ࢝࠮ࢮࡌࠨࡇ࢒ࡧࡐ࢒ࣇࡖࢮ࡞࢈ࡿࢤ࣪ࣅࣤࣛࢍ࢕ࡦ࡛ࢅࢂࢠ࠴ࠑࢿࡅࢿࠏࢵࣥࡈࠄ࢓࡟ࡌࣿࡼࡖࢱࠁࣞࡄࠋ࣬ࣾࡨࢩ࢕ࡃ࢟ࢬࡩ࢞ࢿ࡬ࣈࠤ࣋࢟࡝ࣂ࠶ࣖࣿࠑࣜࢩࢊࣅ࢙ࠄࡼࠖࠃࠌ࣬ࢺࣞࢀ࢑ࡱ࣓ࡑ࣭࣠ࢾࡳࠅ࡫ࠂࠃ࢈ࣦ࣋ࣞ࠲࡙ࢰࡻࢹ࣑ࣹࠣࣘࠕࣞࢄࠢࠪ࡜ࠤࣨࡸࣱࠢࠇࡤࡦࠗ࡟ࢸࢤࡿࣆࢾ࠷ࣟ࠴࣫ࢄࢇࢭࢰࠂ࢚ࠆࡰࠩࣀࣣ࢐࣐ࡁࢄ࣑ࣶࠦࡶࢂࢠࠃࣥࢹ࠹ࣽࣚࢯࠃ࡜ࣶ࡝࡚࣮ࢪࡾࣈࡶࠋࡉ࡛ࢌࠠࢵࢨ࡮ࡒ࠲ࢾࠬ࠘ࡒࠥࠞࣈ࣢࡙ࣀࣟࣗࡩࡈࡷࢳࡤࣈࣹࢷ࡝ࣳ࢞ࡥࠀ࠼ࢩࣙ࠷ࢺࢍ࡬ࡀࣦࣸ࢑ࠬ࠻ࣄࣙࢹ࣌ࢇࠄࠤࡆࡐ࡫ࠔࣜ࠯ࢲࢸ࢔࢝ࡴ࣡ࠒࠐࢾ࠻ࠤࢌࡿ࣮ࢷࢶࡋࢶࠆࣰࢩࡘࢆࣥࡦ࠾ࡹࡍࢦࢿࣟࡦࡷ࣬ࢸࣽࡀࢎࠒ࣬ࢋࡾࢊࡌ࠱ࢭࢶࡥ࠳ࣦࣳࢱࣲࣧࡹ࣏ࠍࠬࠝ࢐࡫࠮࠻࠼ࢨࣗࡦࠬ࢓ࠞ࣊ࣿࢪ࣪ࡠ࣍ࢠࢍ࡛ࢤ࠷ࡀࠉࢾ࠺࠼ࠂࢄࣆࣕࢠ࣐ࡺ࡛ࠗࡐࢷࢀࡳࢆࢫࣆ࢛ࡐࣛ࠯ࣟࠤ࠸ࡁࡅࢥ࢛ࣜࢲࣗࡵࡌࡌ࠻ࢿࣜ࣬ࡕࢇ࢒࡛࣪࠷࡞ࠥࣈࢰ࠻ࡧࡑࠍ࢓࠱ࣥࣼࣇࣂࢶࠚࠗ࢖࠙࢘ࢥࠍࢉ࠰ࣹࡺ࠾ࠃ࢐࢚ࠖࡿࣀࢊࢃ࠹࢞ࢮࢌ࣮࢛ࢍ࠺࡚ࣚࢻ࣒ࡶ࡫ࢌࣺࣶ࡭ࣗࢹࢸ࢞ࣚࡠ࢟ࠢࡃ࣡ࡁࠥࠉࡽࣈ࢔ࡆ࡛ࢥࢧࠔࠥࢷࠣࢩࣚ࠷࠳ࠓࢲࢀ࣏ࡧࢶࠊࡂࣁࢼࢩ࢓ࠤ࠰ࠫࡆࠗ࡞ࠤࡰࢬࠂࡪࣽࠎࢊࣳࡥ࠶࣏ࡣࢶࣻࣇࠀࠠࣔࢅࢯࡷࡁࣷࠞࣘࡹࣔ࠹ࢄࣛ࠮࡟࣡࡯ࠑࡵࣤ࠰࠼ࠔࡉ࡬ࠤ࢏࢚ࠒࡌ
