<!DOCTYPE html>
<html><head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-color:#090909;
            --input-bg: #161616;
            --hover-bg: #2a2d2e;
            --text-main: #d4d4d4;
            --text-dim: rgb(190,190,190);
            --accent: #0078d4;
            --line-color: rgb(30,30,30);
            --radius: 6px;
            --side-gap: 10px;
        }

        html, body {
            height: 100%;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            border-left: 1px solid var(--line-color);
        }

        .main-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px calc(var(--side-gap) + 5px) 8px;
            border-bottom: 1px solid var(--line-color);
        }

        .header-label {
            font-size: 14.9px;
            color: var(--text-dim);
            letter-spacing: 0px;
            font-weight: 600;
        }

        .refresh-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: var(--hover-bg);
        }

        .refresh-icon {
            width: 18px;
            height: 18px;
            fill: var(--text-dim);
        }

        .refresh-btn:hover .refresh-icon {
            fill: white;
        }

        .search-container {
            padding: 15px var(--side-gap);
            border-bottom: 1px solid var(--line-color);
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 10px;
            width: 15px;
            height: 15px;
            fill: var(--text-dim);
            pointer-events: none;
        }

        #search {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid #242424;
            border-radius: var(--radius);
            color: white;
            padding: 0 10px 0 32px;
            height: 32px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        #search:focus { border-color: #444; }

        .file-list {
            flex: 1;
            overflow-y: auto;
            margin: 0;
            padding: 10px var(--side-gap);
            list-style: none;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: transparent;
            border-radius: var(--radius);
            margin-bottom: 2px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-icon {
            width: 16px;
            height: 16px;
            margin-right: 10px;
            fill: var(--text-dim);
            flex-shrink: 0;
        }

        .file-item:hover {
            background: White;
            color: Black;
        }

        .file-item:hover .file-icon {
            fill: Black;
        }

        .file-list::-webkit-scrollbar { width: 6px; }
        .file-list::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-container">
            <div class="header-label" data-i18n="explorer">Explorer</div>
            <button class="refresh-btn" onclick="refreshList()">
                <svg class="refresh-icon" viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"></path></svg>
            </button>
        </div>

        <div class="search-container">
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                <input type="text" id="search" placeholder="Search File..." data-i18n="searchFile" onkeyup="filter()">
            </div>
        </div>

        <div class="file-list" id="list">
            </div>
    </div>

    <script>
        const fileIconSvg = `<svg class="file-icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>`;

        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.file-item').forEach(i => {
                i.style.display = i.textContent.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }

        function refreshList() {
            if(window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage({ action: 'refresh' });
            }
        }

        function setFiles(files) {
            const list = document.getElementById('list');
            list.innerHTML = files.map(f => 
                `<div class="file-item" onclick="openFile('${f}')">${fileIconSvg}<span>${f}</span></div>`
            ).join('');
        }

        function openFile(n) {
            if(window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage({ action: 'load', fileName: n });
            }
        }

window.currentLang = localStorage.getItem("spectra_lang") || "en";

window.LanguageAPI = {

set(lang){

window.currentLang = lang;
localStorage.setItem("spectra_lang", lang);

const dict = {

en:{
explorer:"Explorer",
searchFile:"Search File..."
},

zh:{
explorer:"檔案總管",
searchFile:"搜尋檔案..."
}

};

const data = dict[lang];
if(!data) return;

document.querySelectorAll("[data-i18n]").forEach(el=>{

const key = el.getAttribute("data-i18n");

if(el.tagName === "INPUT"){
el.placeholder = data[key];
}else{
el.textContent = data[key];
}

});

}

};

document.addEventListener("DOMContentLoaded", () => {
LanguageAPI.set(window.currentLang);
});

    </script>

</body></html>
