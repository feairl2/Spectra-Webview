ࢥ࣏ࣴࣳࡼࣨࡽࣂ࠵ࣃ࠹ࡌࣕ࠵ࡂࢫࣰࠧ࡜ࡄࡩࠈࣨ࣍ࣜ࠭ࣔࢥࠁ࣏࠹ࣻ࠴ࢴࡩ࢔ࣦࣵࢷࡁࡾࣂࣽࠐࡑ࡬ࠇ࢔࠺ࠇ࡟࠭࢕࣐࣊࣪ࡳࢴࠧࢄ࣪ࠞࢗࠛࣁ࣎ࠗࢣࠕࡗࣤࡹࠜ࠽ࣇࡔࠗࡃ࠹ࡻ࢘ࢾࣝࠋࣂ࠲࣍ࢳࡽ࢔ࣦ࣎ࠕࠔࡶࣜࣗࣟ࠻࣌ࠍࠇࢳࠁࡇࣺ࢒࠵ࢇࡠࠓࢹࡷࠜࡷࠂࠎࢗࠤࡺࢆ࣌ࠟࡵࢅࡠࡲࢎࡩࢎࠤࣻࠫ࣢ࢭࣖࡅ࣐࠱࣑ࣧ࢝ࠫ࠳ࢹࠆࢎࡷࣈࡕࡢࣇࢶ࢐ࡿࡳࡑࢉࢲࣙࠓ࡭ࢽࣜࣖ࠵ࣾࡔࡴࢄࡻ࣪࣬ࣀࡾ࡛ࡽ࡬ࢶ࠙ࡱ࠻࣌ࡻࠒࠗࠆࡹࡤࡌ࢔ࡏࣄࡑࣷࠈࠠ࣪ࣚࠋࡳࢧ࣢ࣔ࠯ࡎࡃࣧ࢟ࡑࣂࣔࡥࠫࢢࢹ࡚ࡾࢵࢽࡉࠑࣹ࣐࣍࣬ࣉ࢈ࡄ࠘࢜ࠁࠃ࣭ࡊࠅ࠻࢖ࢡࡏ࡭ࢽ࣍ࢽࢫࣺࢂ࠻ࢹ࠘ࢩࠢࣝࡡࣗ࣡ࠏࢧࢄ࠱ࠋ࠮ࡏࡸࢦࢿࡦࣀ࢝ࡎࣂࢭ࡭ࠏࢻࣱࡏ࢕ࢬࣃࢬࡎࢱࠎࠛࠋࢥࢫ࠭࢈࣒࣒ࠝࡵࡘࣘࡔࣤࡋࢥࢸࢵࣞࠛࣸࠔࠈ࣮࣊ࢩࠒࠚࡍࣹࣧࠦࠄࢩࢻࡄࢠࣾ࢓࢑࠻ࠄ࡙ࢇ࠵ࡷࢷࠡࡏࡢࠪ࡫࠮ࠦࣙࡴࠕࢭࣷࢀࣕࢨ࣠ࡋࣼࡶࡩ࢖ࡨ࠭ࠞ࠻ࠇ࢛࣊࡯࡭࡯ࠎࣩࠩࣕࠃࢺ࣯࠾࠻࣭࣍ࠗࠟ࡬ࣻ࣫࠹࠰ࣼࢫࠩࢭ࡭࣢࡭࠱࢟ࠤࣞࢎࢣࠧࢼࠂࣩ࠮ࡉ࣮ࢋࡄࢇࡴ࠼࢖ࡥࢺࢯࢫࠦࢂࣕ࣊࣋ࣔ࣪࡝ࣞࡡࣳ࣎࢏࠶ࡖࠖࡏ࢈࠴ࡾࡲࡂ࣮ࠐࡈࢉࢪࣂ࡮ࡅࡎࡔ࠷࠭ࠋࠃࣽࠀࣴࡲࠋࠛࢡࠄ࢜ࢩ࢏ࡏ࢘࠿ࡪ࠮ࠃࡱ࡭ࢃࣉࣁࠌࣹ࣎ࠫ࠸ࠚ࢑ࡗ࡫ࠒ࠹ࢾࡷࡩࡂࢷࡔ࠿ࣹࠦࢎ࢙ࣹࢬࡰ࢖࠱ࡀࣷࢗࠧࠁࡡ࢐࣪ࠫࡖࢥ࠘࢜ࡕࢥ࢙ࡓࡈࣆࠞࡍࠇࡹ࣎ࢅࠅࠄࢂࣶࡲࢾ࠻ࢎࢤࡋ࣏࣒ࠪࣘࣽ࡫࠵࡝ࠜ࠿ࠪࡀ࠹ࠇࡉ࡙࣌ࠚࢼ࢖ࢠࣵࠎࣺࡌ࢏ࡼࣘࣈࡆࢤࠏࣞࠉࢍࢪࠧࠔࢍࡺࡴࡸ࠱ࠗࡴࢨࣗࡼ࠺ࠒࠗ࠵ࢊ࢖࢚ࣖ࠮ࢢࢵ࠾࣌ࠑࣟࢌ࣑ࣔࠅ࣑ࣟࡡࠁࢆࠎࠗࣃ࢈࠲ࠬࢾࡼࢥ࣏ࡆࡌࠃ࣪࠘ࣗࡰࡡ࣫ࣼࡏࠤ࡝ࢫࣙ࠰ࢿࣳ࡮ࠇ࠻ࡼ࠱ࡱࡆࡐࠄࣁࢺࢇࣺ࠽ࢼࡽࣂࠞࡗ࡫ࠟ࢕ࣣࢻࠐࡳ࡚࡫ࠗࠨࢽࣳࡗ࡜ࢫࡎࣶ࢟࣎࣌ࠋࠏࢺࠅࠏࠍ࢙࢓ࠢ࠯ࢽࠜࠍࣃࢡࣶࡋࡴࢍࡔࢥࠩࠪ࡟ࣣࣣࣖ࣊ࠧ࠘ࠢࠈࠪࣵࡶࢁࣉ࡮ࣩࣘࠏࠅࢵࣼࢳ࣯ࢬ࠹ࢰ࠻ࢢࠢࡩࠁࠛࢼࢽࢳࢻࢅࠁࢋࡧࢗࢅࡱࣸࣾࡁ࠸࣒ࡂ࣓࠳࣓ࠢࠕ࠭ࡘࠣࡹ࣎ࣀࡿࣱ࣫ࠚ࠷ࣞ࠶ࣣ࣍࣪ࢅࡃࠆࡗ࠿ࡪ࣒ࠔࣤࢭ࠼ࠆ࡝ࠏ࣐࢒ࡿࡏࢄࠪࡆ࢛ࢣࣖ࢏࠷࡜ࢨࡿ࠼࠯࢞࠴ࣝࠩࡣࡠ࠮ࢶࣤࢢࡍ࣢ࣤ࣊ࢉࡐ࣒ࡻࡈࢮࢣࠉࢯࡈࡵ࣒ࡰ࣪࢝ࣾ࠾࠱࡬࠴ࡨ࣍ࠟࣁ࡚ࡩ࣪ࣝࣟࢃࡺࡄ࠳ࢺ࢛ࡍ࠺ࡦࡒ࠮ࣔ࢕࣠ࡔࣛࠌࡳࡁࡼࣆ࣬࠰ࢳ࢝ࣸࠆ࢐ࢢ࡙ࢧࢶࡁࠛࢆࣷࡕࠥࣤ࢐࣬࡝ࡏ࠹ࣜࣂ࣒࡮ࢄࠧࡶ࠻࣍ࣔࡀ࢜࠭࠵࠼࠿࠼ࣲࠍࡩࣞࠅࢭࠁ࡬ࢬ࣬ࣁࣾࢠ࣌ࢩࣻ࣪ࡋࡺࣁࣤࣜࢦࡦࣤ࣪ࢇ࣐ࡴࢲࢼࡉࡾࠋ࡬࠹ࡁࠕࠍࡐ࡫࢛ࡩࡆࠊࢭࡵ࢞࢜ࣉࠗࢩࢭࠦࣥ࣍ࣅࠗࡔࢄ࡙ࠔ࠼࠺ࣴࣿࢄࢨࣈ࡬ࡘࠕࠏࣦ࡭ࠁࡀࡳ࣫ࣾࠝࠩࡋࢌࠤࣶ࢙ࡷࣉ࣬࣫࠴ࡽࡨࣽ࠭ࠂ࣑࢞ࣇࣘࡲࡀ࠾࣫ࣉࡔ࠳ࣇࢻࢋࡎ࠱ࢨࡓ࡚ࠫࢼ࣊ࡽࡔࡥࡀ࠱࢔ࡇࡼ࠾ࢎ࡚࣒࣬࠙ࡱ࣮࢐࢛ࡹࠎ࣭ࢡ࠻࠰ࣣࠉ࣠࡯࣒࢓ࡿࣰ࢙ࠗࡽࢨ࣮࡬ࡩࣜࣖ࠶ࡦ࣭ࠇࢰࢉࡊࠡ࠾ࡩࢎࢯࠒ࣋ࡁࣃࡊ࠸ࠈࡽࡌࢰ࢞ࢯ࠻ࣵࠪࡓࡋࡤ࢐࠯࡚ࣶࠆ࣐ࣵࠝ࣫ࡌࡍࠬࠔࡍࡍࣹࣜ࠹ࡎࠬࡳࣂࢷ࠳ࠗࣞࡡࣘࢃ࠳࢑ࠕ࣍ࣅࡳ࠽ࢊ࣓ࢍ࣌ࠄࣨࡕ࢑࢔ࠐࢧࡴࠇࡧࢸ࢑ࢭ࠻ࢲࢣࠫࣆࢂࡉࣗࣂ࠵ࢸࢎࠢࢶࠄࡿࡽࠅࢳࢩ࢛ࣺ࢞ࢾࢥࠤ࢐ࣄࠁࡒࢧ࢈࠰ࢬࡰࢹࠄࠂࢫࡁࣄࠔࢉࢦ࣢ࢯࡌ࠴ࡩࢌࠉࡑ࢖ࣺ࣊࢐ࣗ࡯ࡾࣱ࢕࢔࠘ࠁࢹ࡞ࠔࣙ࢖ࠩ࠳ࢌ࠻ࢫ࢐ࢦࣄࠠࠬࠂࠖ࠭ࣝࡑࠒ࡛ࠝࡵࡨ࢞ࡩࢮࠬࢤ࣢ࣂࢠ࠹ࣶࡦࡆࢫࣕ࠳ࡌࣈ࠾ࡅࠕࢠࢽ࡮ࡹࢰࢻ࠯ࡧ࠹࢓ࢇࡄࠑࣗࡄࢺࡩࡣࡥࡱࡧ࠺ࠥ࢘ࢍࠧ࠸ࣇࢧࡻࣘࡺ࡛ࠚࠃࣹࠌࢫ࡬࣏ࡵࢷ࡝࢙ࢮࠗࠂࠍࡩࣶࣝࡻࣱࡇࡒࣝࡆ࢝ࢩࠇࠐࢩࡖ࠽࣑ࠛࠗࣤࡵࡄࡴࡓࢋࣅࠇ࣋ࡘࠝࠈࠞ࢞ࢃࡵ࢖࢞ࠁࡲ࡯࠽ࢎࠧࡳࠃ࣐ࣈࣚ࣬ࠬ࡝ࣇࡽ࣯࣮ࣛࣜࣞࣙࠟࢄ࣓ࡴࣝ࡫ࡋࢮࢸࣻࢺࠫ࡯ࡣࣾࡊࡔࠍࠇ࢔࣓ࡥ࣐࢈ࡄ࣭ࢁ࠮ࢇࣘ࢐ࠗࢴ࡝ࣩࣴࢌࢩࢵ࠰ࣰ࢝࡝ࢌࠉࡲ࠿࠵ࣁ࡬ࡗ࢈࠯ࣹࣾࣉࡎࢍࣷ࢖ࠢ࠷ࢇ࡭ࣲࡆࠕࢊࡕ࣏࢚ࠢࣜࡎࣅࣸ࠰ࣱࡓࠁࠌࢣࢨࡸࡹࠗࢫࡳࢦࡈࠍࡳ࢝࣠࠰ࢭࢣࣆ࠴ࡰࠦ࣬࡫ࣰࠦࢮ࡛ࣦࠟࠇࢵࣈࡳ࠶ࡇࠢࠢࡆࡌࡺࠇ࠿ࢳ࠱࣠࢖ࢎ࢖ࡆࢬࡁࠒࢴࢀࡓࠐࠊࠝࡰࡊࠁࢎࠫ࠶ࡣࡆࢦ࡚ࣻࣉࣦࠧࣆࠀࠚࠛࠀࡆࡖࢾࢩ࡟࢖ࠌࢨࡥࣴࢷࢋ࠵ࠊ࠽࡭ࠬࢨ࣮ࠠࢸࢍࢮ࣬ࠡࠖ࡬ࠀࠄࡆࠚࡼࢱࠌࡳ࣐࢘ࡓ࡜ࣁࣁ࡞ࠦࠂࢩࠪ࣬ࠄࢩࠬࡘࢲࡍࢂࢧࠒࡻ࠽࢛ࢾ࣑ࠪࣥࣅࡂ࡭࢘ࣤࢣ࣡ࠩࣨ࠶ࣙࡵ࣏ࠥࠅࡆ࠿ࢣ࢐ࡅࢵ࡫࢝࢔ࢯࡋࣛࢡࠔ࡭࠘ࠇࢄࠂࡅࣿࠆࡄࢋࠂ࡞ࢩࡏ࣋࡭ࡵࢧ࣫ࢗࡂ࢙࣏ࣵࡩ࡭ࢀࣖࠒ࠵ࠤ࠘ࡡࢭ࢏ࢣ࡟ࣘࠗࢹ࢓࢝ࣕࢎࠞ࣬ࣴࠒࡌࢎࢺ࢜ࣔࢃࢁ࠳࠵ࢴࢥࡤ࣊࢑ࣽࣳࣴࠈࣞࢼࣜ࠘࠘ࡊࡔࢴࣈࢸࢮࣃࣄࢩࢬࠔࠣࡘ࢏ࠃࣣࢄࢷࠫ࡝ࡃ࠱ࣕࣅࢄࠝ࡟ࡍࣿࡉࣟࡰ࠵࣌ࠚ࣢ࣼࢹࠐࠚ࢜ࣝ࢔ࠒ࣯ࣣࣝࠖࣆ࢛ࣙࡋ࢓ࡖ࠰࡫ࠑࣱࡿ࢒ࠐࣻ࠱ࢴࣰ࣬ࣆࢨ࣯ࣦ࣮ࢼࡴ࣏ࠛ࢘ࡄ࠯࢟ࡏ࠱ࣈࠒ࠷ࠅࡘࡁࢃ࢓࢏࣊ࢄࣶࡏ࢓ࡃ࣌ࠊࠨࠒࣷࢄࡋࢻࠅࢩࢨ࢑ࡩࣖ࢘ࠉࡏ࠭ࡂࠂࣀࢵࢲࣾࡧ࣐ࢠࢩ࠷ࢌࡷࡼࠡࠇ࣮ࣤࣼࡴࡩࣰࢨ࣍ࢋࡣࠚࢻࡏ࢕ࡕࠐ࣪࠳ࣩ࠽ࢄ࣮ࢭࢻࠢࣸࠉࠀࡳࣁࠬࣼࠑࣝࣤࢇ࢝ࡹࡊࣗࢠࠛࠚ࠷࢟ࣅࣣ࡛ࡏ࣒ࠧ࣊ࣼ࢑ࢶࡁࡓࡄࡏ࠵࠲ࠤࠀࣳ࠭ࡆࡗࣚࠟࠑ࣐ࣳࢌࣘࢰ࢒ࢆࢇࡠ࠰ࡃ࢕ࡱࣁࠏࣂࡤ࣢࠼ࠞ࣬࣡࣬ࢾࠦࡎࣇࡨ࢏ࡩࢧࠝࢎࡸࣰࡇࣘࢬ࡝ࡶࣀࣱ࣭࣐࡛ࢻࣿ࠸ࢥࢆࡱࡎࡨ࢙ࡸࢍࡗࠑ࣬࠭ࡒࢠ࢘ࠈࡤࢉ࠳ࢀࣩ࠘࢕ࠌࡥࠉࣈࠃࢍࠎࠜࢶ࡚ࡌࢹࣲࢬࢯࡌࡻࡒࠄࢎࠞࡏࠋࠖ࣪ࡓࣜࡵࢯࢸࣈ࡚ࢭࠁࢿ࠾ࢵࢹࣔࢂࡋ࣋ࢳࡪࡰ࢘ࠈ࡬ࢢ࠵ࣨࣄ
