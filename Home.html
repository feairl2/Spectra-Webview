<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: rgb(12, 12, 12);
            --panel-bg: rgb(22, 22, 22);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #949494;
            --round: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
            user-select: none;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        .wrapper {
            width: 95%;
            max-width: 1000px;
            height: 90%;
            max-height: 580px; 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header h1 {
            font-size: clamp(24px, 4vw, 34px);
            font-weight: 600;
            letter-spacing: -0.01em;
            text-transform: uppercase;
            color: #808080;
        }

        .spectra-text {
            font-weight: 600;
            color: var(--text-main);
            display: inline-block;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: var(--round);
            padding: 16px 20px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 0;
        }

        .left-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .version-label {
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .version-val {
            font-size: clamp(16px, 2vw, 22px);
            font-weight: 700;
            color: #fff;
        }

        .btn-modern {
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 7px;
            text-align: center;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            margin-top: auto;
            cursor: pointer;
            display: inline-block;
            align-self: flex-start;
        }

        .btn-modern:hover {
            box-shadow: 0 8px 15px rgba(255, 255, 255, 0.1);
            filter: brightness(0.9);
        }

        .logs-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .log-entry {
            font-size: 16px;
            color: #ececec;
            line-height: 1.5;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            gap: 10px;
        }

        .log-entry::before {
            content: "•";
            color: #444;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        @media (max-width: 650px) {
            .main-grid { grid-template-columns: 1fr; overflow-y: auto; }
            .wrapper { height: auto; max-height: none; padding-bottom: 40px; }
            body { overflow-y: auto; }
            .btn-modern { align-self: stretch; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>Welcome to <span class="spectra-text">Spectra</span></h1>
        </header>

        <main class="main-grid">
            <section class="left-column">
                <div class="panel" style="flex: 1;">
                    <div class="version-label">Executor Version</div>
                    <div id="exec-version" class="version-val">Checking...</div>
                </div>

                <div class="panel" style="flex: 1;">
                    <div class="version-label">Injector Version</div>
                    <div id="inj-version" class="version-val">Checking...</div>
                </div>

                <div class="panel" style="flex: 1;">
                    <div class="version-label">Roblox Version</div>
                    <div id="roblox-version" class="version-val">Checking...</div>
                </div>

                <div class="panel" style="flex: 1;">
                    <p style="color: var(--text-dim); font-size: 13px; font-weight: 500; white-space: nowrap;">
                        Join our community for updates.
                    </p>
                    <a href="https://discord.gg/sy4R8MbDAQ" class="btn-modern">Discord Server</a>
                </div>
            </section>

            <section class="panel">
                <div class="version-label" style="margin-bottom: 8px;">System Changelog</div>
                <div id="update-logs" class="logs-container">
                </div>
            </section>
        </main>
    </div>

    <script>
        async function fetchText(file) {
            try {
                const res = await fetch(file);
                return res.ok ? await res.text() : null;
            } catch { return null; }
        }

        async function init() {
            const ev = await fetchText('version.txt');
            if(ev) document.getElementById('exec-version').innerText = ev.trim();

            const iv = await fetchText('Inject-version.txt');
            if(iv) document.getElementById('inj-version').innerText = iv.trim();

            const rv = await fetchText('roblox-version.txt');
            if(rv) document.getElementById('roblox-version').innerText = rv.trim();

            const ul = await fetchText('update-logs.txt');
            const logBox = document.getElementById('update-logs');
            if(ul) {
                const lines = ul.split('\\n').filter(t => t.trim() !== "");
                logBox.innerHTML = lines.map(text => `
                    <div class="log-entry">${text.trim()}</div>
                `).join('');
            } else {
                logBox.innerHTML = '<div class="log-entry" style="color:#444">No logs found.</div>';
            }
        }
        init();
    </script>
</body>
</html
